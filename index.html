<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심쿵! 학급 자리배치</title>
    
    <!-- 스타일 라이브러리 로드 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 기능 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- 구글 폰트 (Pretendard & Jua) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }
        
        .cute-font { font-family: 'Jua', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .input-focus:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* 칠판 애니메이션 효과 */
        .blackboard {
            background: #2D4356;
            border: 6px solid #8B4513;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .blackboard::after {
            content: '';
            position: absolute;
            bottom: 5px;
            right: 20px;
            width: 30px;
            height: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 2px;
            box-shadow: -40px 0 0 rgba(255,255,255,0.5);
        }

        /* 짝꿍 디자인 */
        .pair-container {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .seat-card {
            height: 80px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .seat-card:hover {
            transform: translateY(-5px);
        }

        .seat-boy {
            background-color: #EEF2FF;
            border-color: #A5B4FC;
            color: #4338CA;
        }

        .seat-girl {
            background-color: #FFF1F2;
            border-color: #FDA4AF;
            color: #BE185D;
        }

        .seat-empty {
            background-color: #F8FAFC;
            border-color: #E2E8F0;
            color: #94A3B8;
            border-style: dashed;
        }

        /* 시점 전환 효과 */
        #grid-container { transition: all 0.5s ease; }
        .view-teacher { flex-direction: column-reverse !important; }
        .view-teacher-grid { flex-direction: column-reverse !important; }

        .btn-cute {
            border-radius: 1rem;
            transition: all 0.2s;
            font-family: 'Jua', sans-serif;
        }

        .btn-cute:active { transform: scale(0.95); }
    </style>
</head>
<body class="py-10 px-4">

<div class="container max-w-5xl">
    <!-- Header -->
    <div class="text-center mb-10">
        <h1 class="cute-font text-5xl text-indigo-600 mb-2 drop-shadow-sm">🍭 학급 자리 배정 대작전</h1>
        <p class="text-gray-500 font-medium">우리 반의 행복한 짝꿍을 찾아주세요!</p>
    </div>

    <!-- Main Content -->
    <div class="glass-card p-8 mb-8">
        <!-- Input Section -->
        <div class="row g-4 mb-8">
            <div class="col-md-6">
                <label class="cute-font text-2xl text-indigo-500 mb-2 flex items-center gap-2">
                    <span>👦</span> 멋진 남학생 명단
                </label>
                <textarea id="boys-input" class="form-control rounded-2xl p-4 input-focus border-2" rows="4" 
                    placeholder="엔터로 구분해서 이름을 적어주세요">김우주&#10;이도윤&#10;박시우&#10;최서준&#10;정지호&#10;한민준&#10;윤유준&#10;임주원&#10;오예준&#10;송준우&#10;신건우&#10;안현우</textarea>
            </div>
            <div class="col-md-6">
                <label class="cute-font text-2xl text-rose-500 mb-2 flex items-center gap-2">
                    <span>👧</span> 예쁜 여학생 명단
                </label>
                <textarea id="girls-input" class="form-control rounded-2xl p-4 input-focus border-2" rows="4" 
                    placeholder="엔터로 구분해서 이름을 적어주세요">이지아&#10;김서아&#10;박하윤&#10;최서윤&#10;정서연&#10;한아윤&#10;윤지민&#10;임윤아&#10;오지우&#10;송채원&#10;신소율</textarea>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-gray-50 p-6 rounded-3xl border border-gray-100">
            <div class="flex items-center gap-4">
                <span class="cute-font text-xl text-gray-600">누구 시점으로 볼까요?</span>
                <div class="btn-group shadow-sm bg-white p-1 rounded-2xl">
                    <input type="radio" class="btn-check" name="viewMode" id="studentMode" value="student" checked onchange="updateView()">
                    <label class="btn btn-outline-indigo px-4 py-2 rounded-xl border-0 font-bold" for="studentMode">학생 (앞이 위)</label>
                    <input type="radio" class="btn-check" name="viewMode" id="teacherMode" value="teacher" onchange="updateView()">
                    <label class="btn btn-outline-indigo px-4 py-2 rounded-xl border-0 font-bold" for="teacherMode">선생님 (앞이 아래)</label>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="arrangeSeats()" class="btn btn-indigo btn-lg btn-cute px-8 bg-indigo-600 text-white shadow-indigo-200 shadow-lg">
                    랜덤 배치! ✨
                </button>
                <button onclick="saveAsPDF()" class="btn btn-emerald btn-lg btn-cute px-8 bg-emerald-500 text-white shadow-emerald-200 shadow-lg">
                    PDF 저장 📄
                </button>
            </div>
        </div>
    </div>

    <!-- Board Area -->
    <div id="pdf-area" class="bg-white rounded-[3rem] p-10 shadow-2xl">
        <div id="classroom-layout" class="flex flex-col items-center gap-10">
            <!-- Blackboard -->
            <div class="blackboard w-3/5 py-4 rounded-xl text-white text-center cute-font text-3xl tracking-[1rem]">
                칠 판
            </div>

            <!-- Seat Grid -->
            <div id="grid-container" class="w-full flex flex-col gap-8 max-w-4xl">
                <!-- Rows generated by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // 최초 실행
    document.addEventListener('DOMContentLoaded', arrangeSeats);

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function arrangeSeats() {
        const boys = document.getElementById('boys-input').value.split('\n').map(v => v.trim()).filter(v => v);
        const girls = document.getElementById('girls-input').value.split('\n').map(v => v.trim()).filter(v => v);

        shuffle(boys);
        shuffle(girls);

        const container = document.getElementById('grid-container');
        container.innerHTML = '';

        const ROWS = 4;
        const PAIRS_PER_ROW = 3;

        for (let r = 0; r < ROWS; r++) {
            const rowEl = document.createElement('div');
            rowEl.className = "flex justify-between gap-12 w-full"; // 복도 간격 gap-12

            for (let p = 0; p < PAIRS_PER_ROW; p++) {
                const pairEl = document.createElement('div');
                pairEl.className = "flex gap-1 flex-1 pair-container"; // 짝꿍 밀착 gap-1

                // 남학생 (홀수열)
                const boy = boys.shift();
                pairEl.appendChild(createSeat(boy, 'boy'));

                // 여학생 (짝수열)
                const girl = girls.shift();
                pairEl.appendChild(createSeat(girl, 'girl'));

                rowEl.appendChild(pairEl);
            }
            container.appendChild(rowEl);
        }

        // SweetAlert2 성공 메시지
        Swal.fire({
            title: '배치 완료!',
            text: '새로운 짝꿍이 정해졌어요. 마음에 드시나요?',
            icon: 'success',
            confirmButtonText: '확인',
            confirmButtonColor: '#6366f1',
            timer: 1500
        });
    }

    function createSeat(name, gender) {
        const div = document.createElement('div');
        div.className = `seat-card flex-1 rounded-2xl flex flex-col items-center justify-center shadow-sm border-2 ${name ? 'seat-'+gender : 'seat-empty'}`;
        
        const nameText = name ? name : '빈자리';
        const genderMark = gender === 'boy' ? '♂' : '♀';
        const genderColor = gender === 'boy' ? 'text-indigo-300' : 'text-rose-300';

        div.innerHTML = `
            <span class="text-lg font-extrabold">${nameText}</span>
            <span class="text-xs font-bold ${genderColor} mt-1">${genderMark}</span>
        `;
        return div;
    }

    function updateView() {
        const mode = document.querySelector('input[name="viewMode"]:checked').value;
        const layout = document.getElementById('classroom-layout');
        const grid = document.getElementById('grid-container');

        if (mode === 'teacher') {
            layout.classList.add('view-teacher');
            grid.classList.add('view-teacher-grid');
        } else {
            layout.classList.remove('view-teacher');
            grid.classList.remove('view-teacher-grid');
        }
    }

    function saveAsPDF() {
        // PDF 저장 전 알림
        Swal.fire({
            title: 'PDF 저장 중...',
            html: '잠시만 기다려주세요!',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const element = document.getElementById('pdf-area');
        const opt = {
            margin: 10,
            filename: '우리반_자리배치표.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            Swal.fire({
                title: '저장 성공!',
                text: 'PDF 파일이 다운로드 폴더에 저장되었습니다.',
                icon: 'success',
                confirmButtonColor: '#10b981'
            });
        });
    }
</script>

</body>
</html>
