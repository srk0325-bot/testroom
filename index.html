<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM 럭키 청소 당번 추첨기</title>
    
    <!-- Bootstrap 5 CSS (레이아웃 구조용) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS (초정밀 프리미엄 디자인용) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (고급 아이콘팩) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 (네온 팝업 메커니즘) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }
        
        /* 초정밀 글래스모피즘 플레이트 */
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 둥둥 떠 있는 듯한 번호 대기 슬롯 */
        .ball-slot {
            border: 2px dashed rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        /* 커스텀 SweetAlert2 다크 모드 팝업 레이아웃 */
        .swal2-popup.my-custom-swal {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px !important;
            color: #f8fafc !important;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.25);
        }

        /* 회전하는 네온 링 장식 */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen d-flex align-items-center justify-content-center p-4">

<div class="container-sm max-w-xl">
    <!-- 메인 추첨 카드 -->
    <div class="glass-card rounded-3xl p-8 p-md-10 text-center position-relative overflow-hidden">
        
        <!-- 탑 보더 그라데이션 라인 -->
        <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-cyan-400 via-indigo-500 to-fuchsia-500"></div>

        <!-- 헤더 영역 -->
        <div class="mb-8 position-relative">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-600 text-white text-2xl shadow-lg shadow-indigo-500/30 mb-4 animate-bounce">
                <i class="fa-solid fa-sparkles"></i>
            </div>
            <h1 class="fw-extrabold tracking-wider text-3xl md:text-4xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-200 to-fuchsia-400 mb-2">
                CLEANING SQUAD
            </h1>
            <p class="text-slate-400 text-sm fw-normal">
                1번부터 30번 중, 오늘 구역을 정화할 <span class="text-cyan-400 fw-bold">운명의 5인</span>을 탐색합니다.
            </p>
        </div>

        <!-- 추첨 구역 플레이트 (공들이 나타나는 존) -->
        <div class="row g-3 justify-content-center mb-10" id="resultContainer">
            <!-- 기본 상태 대기용 슬롯 디자인 -->
            <div class="col-auto"><div class="ball-slot d-flex items-center justify-center rounded-full text-slate-600 fw-bold shadow-inner" style="width: 64px; height: 64px;"><i class="fa-solid fa-question text-sm opacity-60"></i></div></div>
            <div class="col-auto"><div class="ball-slot d-flex items-center justify-center rounded-full text-slate-600 fw-bold shadow-inner" style="width: 64px; height: 64px;"><i class="fa-solid fa-question text-sm opacity-60"></i></div></div>
            <div class="col-auto"><div class="ball-slot d-flex items-center justify-center rounded-full text-slate-600 fw-bold shadow-inner" style="width: 64px; height: 64px;"><i class="fa-solid fa-question text-sm opacity-60"></i></div></div>
            <div class="col-auto"><div class="ball-slot d-flex items-center justify-center rounded-full text-slate-600 fw-bold shadow-inner" style="width: 64px; height: 64px;"><i class="fa-solid fa-question text-sm opacity-60"></i></div></div>
            <div class="col-auto"><div class="ball-slot d-flex items-center justify-center rounded-full text-slate-600 fw-bold shadow-inner" style="width: 64px; height: 64px;"><i class="fa-solid fa-question text-sm opacity-60"></i></div></div>
        </div>

        <!-- 작동 버튼 트리거 -->
        <div class="d-grid gap-2 max-w-xs mx-auto">
            <button onclick="handleDrawTrigger()" class="btn btn-lg border-0 text-white font-bold bg-gradient-to-r from-cyan-500 via-indigo-600 to-fuchsia-600 hover:from-cyan-400 hover:to-fuchsia-500 rounded-full py-4 px-8 shadow-lg shadow-indigo-500/20 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 tracking-widest text-base">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> 운명의 룰렛 가동
            </button>
        </div>

    </div>
</div>

<script>
    // 운명의 5인 번호 뽑기 핵심 로직 (순수 JS)
    function generateLuckyNumbers() {
        const numbers = [];
        while (numbers.length < 5) {
            const num = Math.floor(Math.random() * 30) + 1;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }
        return numbers.sort((a, b) => a - b);
    }

    // 화면에 번호 공들을 렌더링하는 함수
    function renderBallElements(luckyNumbers) {
        const container = document.getElementById('resultContainer');
        container.innerHTML = ''; // 이전 요소 청소

        // 프리미엄 네온 테마 컬러셋
        const gradients = [
            'from-cyan-400 to-blue-500 shadow-cyan-500/20',
            'from-sky-400 to-indigo-500 shadow-indigo-500/20',
            'from-indigo-400 to-purple-500 shadow-purple-500/20',
            'from-purple-400 to-fuchsia-500 shadow-fuchsia-500/20',
            'from-fuchsia-400 to-pink-500 shadow-pink-500/20'
        ];

        luckyNumbers.forEach((num, index) => {
            const col = document.createElement('div');
            col.className = 'col-auto';
            
            const ball = document.createElement('div');
            ball.className = `d-flex align-items-center justify-content-center fw-black rounded-full text-white shadow-xl bg-gradient-to-br ${gradients[index]} border border-white/20`;
            ball.style.width = "64px";
            ball.style.height = "64px";
            ball.style.fontSize = "1.4rem";
            
            // 시각적 등장을 극대화하기 위해 초기값 설정
            ball.style.transform = "scale(0) rotate(-180deg)";
            ball.style.transition = "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
            ball.innerText = num;
            
            col.appendChild(ball);
            container.appendChild(col);
            
            // 시차를 주어 순차적으로 팡팡- 터지는 연출
            setTimeout(() => {
                ball.style.transform = "scale(1) rotate(0deg)";
            }, index * 180);
        });
    }

    // 예외 상황 대비 즉시 추첨 처리 (SweetAlert가 오류나거나 로드가 안 될 때 발동하는 비상 기능)
    function executeDirectDraw() {
        const numbers = generateLuckyNumbers();
        renderBallElements(numbers);
    }

    // 메인 실행 컨트롤러
    function handleDrawTrigger() {
        // [안전 장치 1] SweetAlert2 로드가 실패했거나 라이브러리가 존재하지 않을 경우 즉각 다이렉트로 추첨 작동
        if (typeof Swal === 'undefined') {
            executeDirectDraw();
            return;
        }

        const finalNumbers = generateLuckyNumbers();

        // [안전 장치 2] 커스텀 로더 HTML 템플릿 사용 (자체 CSS 애니메이션으로 멈춤 현상 완벽 방지)
        Swal.fire({
            title: '🔮 데이터 스캔 중...',
            html: `
                <div class="text-slate-400 my-3 text-xs md:text-sm">추첨 알고리즘 가동 중. 잠시만 기다려주세요...</div>
                <div class="flex flex-col items-center justify-center my-4 py-2">
                    <!-- 멋진 네온 로더 수동 구현 -->
                    <div class="w-12 h-12 border-4 border-cyan-400/20 border-t-cyan-400 rounded-full animate-spin mb-4"></div>
                    <span class="text-xs font-mono tracking-widest text-cyan-400 animate-pulse">ANALYZING CANDIDATES...</span>
                </div>
            `,
            timer: 1600, // 1.6초 뒤 자동 종료 후 당첨 연출 돌입
            timerProgressBar: true,
            showConfirmButton: false,
            allowOutsideClick: false,
            customClass: {
                popup: 'my-custom-swal',
                title: 'text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-300 fw-bold fs-4'
            }
        }).then(() => {
            // 로딩 창이 완전히 닫힌 직후 메인 보드에 공 그리기 실행
            renderBallElements(finalNumbers);

            // 공이 튀어나오는 연출 완료 시점에 맞춰서 최종 축하 명단 모달 알림 팝업
            setTimeout(() => {
                const gradients = [
                    'from-cyan-400 to-blue-500',
                    'from-sky-400 to-indigo-500',
                    'from-indigo-400 to-purple-500',
                    'from-purple-400 to-fuchsia-500',
                    'from-fuchsia-400 to-pink-500'
                ];

                let badgeHtml = '<div class="flex justify-center flex-wrap gap-2.5 my-4">';
                finalNumbers.forEach((num, index) => {
                    badgeHtml += `
                        <span class="inline-block px-4 py-3 rounded-2xl bg-gradient-to-r ${gradients[index]} text-white font-black text-2xl shadow-lg shadow-indigo-500/10 min-w-[65px] transform hover:scale-105 transition-transform duration-200">
                            ${num}
                        </span>`;
                });
                badgeHtml += '</div>';

                Swal.fire({
                    title: '🎉 당번 선발 완료!',
                    html: `
                        <div class="text-slate-300 text-sm mb-4">오늘 당첨된 행운의 청소 요정입니다!</div>
                        ${badgeHtml}
                        <div class="text-xs text-emerald-400 mt-3"><i class="fa-solid fa-shield-halved mr-1"></i> 메인 화면에도 명단이 정상 저장되었습니다.</div>
                    `,
                    icon: 'success',
                    iconColor: '#22c55e',
                    confirmButtonText: '임무 시작하기 🧹',
                    customClass: {
                        popup: 'my-custom-swal',
                        title: 'text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 fw-black fs-3',
                        confirmButton: 'btn border-0 px-5 py-3 rounded-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold shadow-lg shadow-emerald-500/20'
                    }
                });
            }, 1000); // 메인 카드 공 생성 연출이 끝나는 타이밍에 맞춰 피날레 제공
        });
    }
</script>

</body>
</html>
